name: Cognium Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  cognium:
    name: Security Scan (Typescript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cognium-ai
        run: npm install -g cognium-ai

      # ── scans ──────────────────────────────────────────────────────────────
      - name: SAST scan (summary)
        run: cognium-ai scan . -f summary -o scan-summary.txt
        continue-on-error: true

      - name: SAST scan (SARIF → Security tab)
        run: cognium-ai scan . -f sarif -q -o cognium.sarif
        continue-on-error: true

      - name: Trust score
        run: cognium-ai trust . -f json -o trust.json
        continue-on-error: true

      - name: Quality score
        run: cognium-ai quality . -f json -o quality.json
        continue-on-error: true

      - name: Secrets scan
        run: cognium-ai secrets . -f json -o secrets.json
        continue-on-error: true

      # ── upload SARIF ────────────────────────────────────────────────────────
      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cognium.sarif
          category: cognium-sast
        continue-on-error: true

      # ── build PR comment ────────────────────────────────────────────────────
      - name: Build PR comment
        if: github.event_name == 'pull_request'
        run: |
          # ── parse scan ────────────────────────────────────────────────────────
          num() { grep -m1 "$1" "${2:-scan-summary.txt}" | grep -oE '[0-9]+' | head -1 || echo 0; }
          TOTAL=$(num 'Total findings:'); CRIT=$(num 'Critical:')
          HIGH=$(num 'High:'); MED=$(num 'Medium:'); LOW=$(num 'Low:')

          # ── parse trust ───────────────────────────────────────────────────────
          TRUST=$(python3 -c "import json,sys; d=json.load(open('trust.json')); print(round(d['score'],1))" 2>/dev/null || echo '??')
          TIER=$(python3  -c "import json,sys; d=json.load(open('trust.json')); print(d['tier'])"         2>/dev/null || echo '??')

          # ── parse quality ─────────────────────────────────────────────────────
          QUAL=$(python3  -c "import json,sys; d=json.load(open('quality.json')); print(d['score'])"      2>/dev/null || echo '??')
          QTIER=$(python3 -c "import json,sys; d=json.load(open('quality.json')); print(d['tier'])"       2>/dev/null || echo '??')

          # ── parse secrets ─────────────────────────────────────────────────────
          SEC_TOTAL=$(grep -m1 '"activeSecrets"' secrets.json | grep -oE '[0-9]+' || echo 0)
          SEC_CRIT=$(grep -A4  '"bySeverity"'   secrets.json | grep '"critical"' | grep -oE '[0-9]+' || echo 0)

          # ── badge colours (shields.io) ────────────────────────────────────────
          trust_int=${TRUST%%.*}
          qual_int=${QUAL}
          if   [ "${trust_int:-0}" -ge 90 ] 2>/dev/null; then TRUST_COLOR=brightgreen
          elif [ "${trust_int:-0}" -ge 70 ] 2>/dev/null; then TRUST_COLOR=yellow
          else TRUST_COLOR=red; fi

          if   [ "${qual_int:-0}" -ge 80 ] 2>/dev/null; then QUAL_COLOR=brightgreen
          elif [ "${qual_int:-0}" -ge 60 ] 2>/dev/null; then QUAL_COLOR=yellow
          else QUAL_COLOR=red; fi

          case "$TIER" in
            TRUSTED)  TIER_COLOR=brightgreen; TIER_ICON="✅" ;;
            VERIFIED) TIER_COLOR=yellow;      TIER_ICON="🟡" ;;
            *)        TIER_COLOR=red;         TIER_ICON="🔴" ;;
          esac

          case "$QTIER" in
            EXCELLENT|GOOD) QTIER_ICON="✅" ;;
            FAIR)           QTIER_ICON="🟡" ;;
            *)              QTIER_ICON="🔴" ;;
          esac

          # URL-encode slashes in score labels
          TRUST_LABEL=$(echo "${TRUST}%2F100" | sed 's/ /%20/g')
          QUAL_LABEL=$(echo "${QUAL}%2F100"   | sed 's/ /%20/g')

          TRUST_BADGE="https://img.shields.io/badge/Trust_Score-${TRUST_LABEL}-${TRUST_COLOR}?style=flat-square&logo=shield"
          QUAL_BADGE="https://img.shields.io/badge/Quality_Score-${QUAL_LABEL}-${QUAL_COLOR}?style=flat-square&logo=checkmarx"
          TIER_BADGE="https://img.shields.io/badge/Tier-${TIER}-${TIER_COLOR}?style=flat-square"

          # ── score icon (based on value, not tier) ────────────────────────────
          trust_int=${TRUST%%.*}
          if   [ "${trust_int:-0}" -ge 90 ] 2>/dev/null; then TRUST_ICON="🟢"
          elif [ "${trust_int:-0}" -ge 70 ] 2>/dev/null; then TRUST_ICON="🟡"
          else TRUST_ICON="🔴"; fi

          qual_int=${QUAL}
          if   [ "${qual_int:-0}" -ge 80 ] 2>/dev/null; then QUAL_ICON="🟢"
          elif [ "${qual_int:-0}" -ge 60 ] 2>/dev/null; then QUAL_ICON="🟡"
          else QUAL_ICON="🔴"; fi

          # ── severity icons ────────────────────────────────────────────────────
          crit_icon() { [ "$1" -gt 0 ] && echo "🔴 **$1**" || echo "✅ 0"; }
          high_icon() { [ "$1" -gt 0 ] && echo "🟠 **$1**" || echo "✅ 0"; }

          # ── top findings ──────────────────────────────────────────────────────
          TOP_FINDINGS=$(grep -E '🔴|🟠' scan-summary.txt 2>/dev/null | head -10 | \
            sed 's/^[[:space:]]*/- /' || echo "- none at critical/high severity")

          # ── trust score breakdown ─────────────────────────────────────────────
          TRUST_ROWS=$(python3 - <<'PY'
          import json
          try:
            d = json.load(open('trust.json'))
            comp_map = [
              ('vulnerability_score','Vulnerability'), ('supply_chain_score','Supply Chain'),
              ('exfiltration_score','Exfiltration'),   ('instruction_score','Instructions'),
              ('permission_score','Permissions'),       ('secrets_score','Secrets'),
              ('crypto_score','Crypto'),               ('license_score','License'),
              ('compliance_score','Compliance'),        ('hygiene_score','Hygiene'),
              ('poisoning_score','Poisoning'),          ('provenance_score','Provenance'),
            ]
            rows = []
            for key, label in comp_map:
              v = d.get(key)
              if v is not None:
                bar = '🟢' if v >= 90 else ('🟡' if v >= 70 else '🔴')
                rows.append(f'| {label} | {bar} {round(v)} |')
            print('\n'.join(rows))
          except: pass
          PY
          )

          # ── quality breakdown ─────────────────────────────────────────────────
          QUAL_ROWS=$(python3 - <<'PY'
          import json
          # test-coverage always returns 85 as a default when no test files exist — skip it
          SKIP = {'test-coverage'}
          try:
            d = json.load(open('quality.json'))
            for p in d.get('passResults', []):
              if p.get('pass') in SKIP:
                continue
              sc = p.get('score', 0)
              bar = '🟢' if sc >= 80 else ('🟡' if sc >= 50 else '🔴')
              name = p.get('pass', '?').replace('-', ' ').title()
              print(f'| {name} | {bar} {sc} |')
          except: pass
          PY
          )

          # ── secrets list ──────────────────────────────────────────────────────
          SECRET_LIST=$(python3 - <<'PY'
          import json
          from collections import Counter
          try:
            d = json.load(open('secrets.json'))
            names = [s['patternName'] for s in d.get('secrets', [])]
            for name, count in Counter(names).most_common(8):
              sev = next((s['severity'] for s in d['secrets'] if s['patternName']==name), '')
              icon = '🔴' if sev=='critical' else ('🟠' if sev=='high' else '🟡')
              print(f'- {icon} {count} × **{name}**')
          except: print('- none detected')
          PY
          )

          # ── critical trust findings ───────────────────────────────────────────
          TRUST_CRITS=$(python3 - <<'PY'
          import json
          try:
            d = json.load(open('trust.json'))
            crits = []
            for pr in d.get('passResults', []):
              for f in pr.get('findings', []):
                if f.get('severity','').lower() == 'critical':
                  loc = f.get('location', {})
                  file_ref = f"`{loc.get('file','')}:{loc.get('line','')}`" if loc.get('file') else ''
                  crits.append(f"- {f['message']} {file_ref}")
            print('\n'.join(crits[:6]) if crits else '- none')
          except: print('- none')
          PY
          )

          # ── write comment ─────────────────────────────────────────────────────
          cat > pr-comment.md << COMMENT
          <!-- cognium-scan-comment -->
          ## 🔐 Cognium Security Scan — \`typescript-vuln-demo\`

          [![Trust Score](${TRUST_BADGE})](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) [![Quality Score](${QUAL_BADGE})](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) [![Tier](${TIER_BADGE})](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          | | Result |
          |---|---|
          | **Trust Score** | ${TRUST_ICON} \`${TRUST} / 100\` |
          | **Trust Tier** | ${TIER_ICON} ${TIER} |
          | **Quality Score** | ${QUAL_ICON} \`${QUAL} / 100\` — ${QTIER} |
          | **Critical findings** | $(crit_icon $CRIT) |
          | **High findings** | $(high_icon $HIGH) |
          | **Total findings** | \`${TOTAL}\` (med: ${MED} · low: ${LOW}) |
          | **Secrets detected** | \`${SEC_TOTAL}\` total · ${SEC_CRIT} critical |

          ---

          <details>
          <summary>🔴 Critical & 🟠 High SAST Findings</summary>

          ${TOP_FINDINGS}

          </details>

          <details>
          <summary>📊 Trust Score Breakdown</summary>

          | Category | Score |
          |---|---|
          ${TRUST_ROWS}

          </details>

          <details>
          <summary>🧪 Quality Score Breakdown</summary>

          | Pass | Score |
          |---|---|
          ${QUAL_ROWS}

          </details>

          <details>
          <summary>🔑 Secrets Detected</summary>

          ${SECRET_LIST}

          </details>

          <details>
          <summary>🚨 Critical Trust Findings</summary>

          ${TRUST_CRITS}

          </details>

          ---
          > 📁 [Full run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) · [Security tab](https://github.com/${{ github.repository }}/security/code-scanning) · 🤖 [Cognium](https://cognium.dev)
          COMMENT

      # ── post / update sticky comment ───────────────────────────────────────
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs     = require('fs');
            const body   = fs.readFileSync('pr-comment.md', 'utf8').replace(/^ {10}/gm, '');
            const marker = '<!-- cognium-scan-comment -->';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

      # ── gate: block merge on critical secrets ──────────────────────────────
      - name: Fail if critical secrets detected
        run: |
          CRIT=$(grep -A4 '"bySeverity"' secrets.json | grep '"critical"' | grep -oE '[0-9]+' || echo 0)
          if [ "$CRIT" -gt 0 ]; then
            echo "❌ $CRIT critical secret(s) detected — blocking merge"
            exit 1
          fi
          echo "✅ No critical secrets"
