name: Cognium Security Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

permissions:
  contents: read
  pull-requests: write
  security-events: write   # for SARIF upload to Security tab

jobs:
  cognium:
    name: Security Scan (Typescript)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cognium-ai
        run: npm install -g cognium-ai

      # ── run all three passes ────────────────────────────────────────────────
      - name: Scan — SAST findings
        run: cognium-ai scan . -f summary -o scan-summary.txt
        continue-on-error: true

      - name: Scan — SARIF (Security tab)
        run: cognium-ai scan . -f sarif -o cognium.sarif
        continue-on-error: true

      - name: Trust — supply-chain + all 27 passes
        run: cognium-ai trust . -f summary -o trust-summary.txt
        continue-on-error: true

      - name: Secrets — credential detection
        run: cognium-ai secrets . -f json -o secrets.json
        continue-on-error: true

      # ── upload SARIF to GitHub Security tab ────────────────────────────────
      - name: Upload SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: cognium.sarif
          category: cognium-sast
        continue-on-error: true

      # ── build the PR comment ───────────────────────────────────────────────
      - name: Build PR comment
        if: github.event_name == 'pull_request'
        id: comment
        run: |
          # ── helpers ──────────────────────────────────────────────────────────
          extract() { grep -m1 "$1" "$2" | grep -oE '[0-9]+(\.[0-9]+)?' | head -1 || echo 0; }

          TOTAL=$(extract 'Total findings:' scan-summary.txt)
          CRIT=$(extract  'Critical:'       scan-summary.txt)
          HIGH=$(extract  'High:'           scan-summary.txt)
          MED=$(extract   'Medium:'         scan-summary.txt)
          LOW=$(extract   'Low:'            scan-summary.txt)

          TRUST=$(grep -m1 'Score:' trust-summary.txt | grep -oE '[0-9]+\.[0-9]+' | head -1 || echo '??')
          TIER=$(grep -m1  'Tier:'  trust-summary.txt | sed 's/.*Tier: //' | tr -d '[]' || echo '??')

          SEC_TOTAL=$(grep -m1 '"activeSecrets"' secrets.json | grep -oE '[0-9]+' || echo 0)
          SEC_CRIT=$(grep  -A4 '"bySeverity"' secrets.json | grep '"critical"' | grep -oE '[0-9]+' || echo 0)

          # ── tier icon ────────────────────────────────────────────────────────
          if   [ "$TIER" = "TRUSTED"  ]; then TIER_ICON="✅"
          elif [ "$TIER" = "VERIFIED" ]; then TIER_ICON="🟡"
          else TIER_ICON="🔴"; fi

          # ── severity icons ───────────────────────────────────────────────────
          crit_icon() { [ "$1" -gt 0 ] && echo "🔴 $1" || echo "✅ 0"; }
          high_icon() { [ "$1" -gt 0 ] && echo "🟠 $1" || echo "✅ 0"; }

          # ── top findings ─────────────────────────────────────────────────────
          TOP_FINDINGS=$(grep -E '🔴|🟠' scan-summary.txt | head -10 | \
            sed 's/🔴/- 🔴/;s/🟠/- 🟠/' || echo "- none at critical/high")

          # ── trust components ──────────────────────────────────────────────────
          TRUST_COMPONENTS=$(grep -E 'Vulnerability:|Supply Chain:|Exfiltration:|Instructions:|Permissions:|Secrets:' \
            trust-summary.txt | sed 's/^[[:space:]]*/  /' | head -12)

          # ── secrets list ──────────────────────────────────────────────────────
          SECRET_TYPES=$(grep -oE '"patternName": "[^"]+"' secrets.json | \
            sed 's/"patternName": //;s/"//g' | sort | uniq -c | sort -rn | head -8 | \
            awk '{printf "  - %s × **%s**\n", $1, $2}' || echo "  none found")

          # ── trust findings ────────────────────────────────────────────────────
          TRUST_CRITS=$(grep -A999 'CRIT (' trust-summary.txt | grep '^\s\+- ' | head -6 | \
            sed 's/^[[:space:]]*/  - /' || echo "  none")
          TRUST_HIGHS=$(grep -A999 'HIGH (' trust-summary.txt | grep '^\s\+- ' | head -6 | \
            sed 's/^[[:space:]]*/  - /' || echo "  none")

          # ── write comment ─────────────────────────────────────────────────────
          cat > pr-comment.md << COMMENT
          ## 🔐 Cognium Security Scan — \`typescript-vuln-demo\`

          | Category | Result |
          |---|---|
          | **Trust Score** | \`${TRUST} / 100\` |
          | **Trust Tier** | ${TIER_ICON} \`${TIER}\` |
          | **Critical findings** | $(crit_icon $CRIT) |
          | **High findings** | $(high_icon $HIGH) |
          | **Total findings** | \`${TOTAL}\` (med: ${MED}, low: ${LOW}) |
          | **Secrets detected** | \`${SEC_TOTAL}\` total, ${SEC_CRIT} critical |

          ---

          <details>
          <summary>🔴 Critical & 🟠 High Findings (SAST)</summary>

          ${TOP_FINDINGS}

          </details>

          <details>
          <summary>📊 Trust Score Components</summary>

          \`\`\`
          ${TRUST_COMPONENTS}
          \`\`\`

          </details>

          <details>
          <summary>🔑 Secrets Detected</summary>

          ${SECRET_TYPES}

          </details>

          <details>
          <summary>⚠️ Trust Critical & High Findings</summary>

          **Critical:**
          ${TRUST_CRITS}

          **High:**
          ${TRUST_HIGHS}

          </details>

          ---
          > 📁 Full results: [scan](../actions/runs/${{ github.run_id }}) | [Security tab](../security/code-scanning)
          > 🤖 Powered by [Cognium](https://cognium.dev)
          COMMENT

          echo "comment_file=pr-comment.md" >> "$GITHUB_OUTPUT"

      # ── post / update comment on PR ────────────────────────────────────────
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs');
            const body = fs.readFileSync('pr-comment.md', 'utf8').replace(/^ {10}/gm, '');
            const marker = '<!-- cognium-scan-comment -->';
            const full   = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner      : context.repo.owner,
              repo       : context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner     : context.repo.owner,
                repo      : context.repo.repo,
                comment_id: existing.id,
                body      : full,
              });
            } else {
              await github.rest.issues.createComment({
                owner       : context.repo.owner,
                repo        : context.repo.repo,
                issue_number: context.issue.number,
                body        : full,
              });
            }

      # ── fail CI if critical secrets found ──────────────────────────────────
      - name: Fail if critical secrets detected
        run: |
          CRIT=$(grep -A4 '"bySeverity"' secrets.json | grep '"critical"' | grep -oE '[0-9]+' || echo 0)
          if [ "$CRIT" -gt 0 ]; then
            echo "❌ $CRIT critical secret(s) found — blocking merge"
            exit 1
          fi
          echo "✅ No critical secrets"
